<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     

    <!-- tailwind & daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css file -->
     <link rel="stylesheet" href="style.css">

    <title>Green Tree</title>
    
</head>


<body>
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
    <section class="container text-center mt-5 mx-auto">
        <div class="font-bold text-4xl text-green-400">Choose Your Trees</div>

        <div class="grid grid-cols-12 text-start gap-6 mt-5 ">

            <div class="col-span-3 bg-white shadow-2xl p-4 rounded-2xl">
                <h2 class="font-bold text-3xl mb-5">Categories</h2>
                <div id="category-btn" class="space-y-3">
                    <button class="btn btn-primary w-full" id="allTreesbtn">All Trees</button>
                    
                    <div id="categoryContainer" class="space-y-3">

                    </div>
                </div>
            </div>

            <div class="col-span-6 bg-white shadow-2xl p-4 rounded-2xl">
                <div id="treesContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-4 ">
                    
                </div>

                <div id="loadSpinner" class="hidden justify-center items-center h-[60vh]">
                    <span class="loading loading-bars loading-lg"></span>
                </div>
            </div>



            <div class="col-span-3 bg-white shadow-2xl p-4 rounded-2xl">
                <h2 class="font-bold text-3xl mb-5 ">Cart</h2>
                <div class="space-y-4">

                    <div id="cartContainer" class="space-y-4">
                        <div class="bg-slate-100 rounded-[5px] p-6 flex justify-between">
                            <div class="space-y-1.5">
                                <h2 class="font-semibold">Jackfruit Tree</h2>
                                <p class="font-semibold">$800 × 10</p>
                            </div>
                            <div class="space-y-4">
                                <button class="btn btn-ghost">X</button>
                                <p class="text-right font-semibold text-xl">$500</p>
                            </div>
                        </div>

                    </div>
                    <div id="emptyCartMessage" class="text-center py-4">
                        <p>Your cart is empty</p>
                        <p>Add trees to get started</p>
                    </div>


                    <!-- Total amount -->
                    <div class="flex justify-between items-center bg-green-50 rounded-lg p-4 my-3 font-bold">
                        <span>Total:</span>
                        <span id="totalPrice">$0</span>
                    </div>
                </div>
            </div>
        </div>
        
    </section>

    <section>
        <!-- Open the modal using ID.showModal() method -->
        
          <dialog id="treeDetailsModal" class="modal">
             <div class="modal-box border-b-2 border-b-green-600">
 
                       <div class="text-left">
                             <div class="flex justify-between items-center">
                                <h2 id="modalTitle" class="card-title font-bold text-green-700 text-2xl"></h2>
                                <div class="modal-action mb-4">
                                  <form method="dialog">
                                     <!-- if there is a button in form, it will close the modal -->
                                      <button class="btn btn-ghost">X</button>
                                  </form>
                                 </div>
                             </div>
                              

                              <img id="modalImage" src="" alt="Water Hyacinth" class="h-60 w-full object-cover rounded-[8px]" />

                              <div class="flex gap-2 mt-12 mb-4">
                                <h2 class="font-bold text-gray-500">Category:</h2>
                                <span id="modalCategory" class="bg-green-700  rounded-[8px] px-3 py-[2px] text-[16px] text-white"></span>
                              </div>
                              

                              <p id="modalDescription" class="line-clamp-2 text-[12px]"></p>
                              

                              <div class="card-actions justify-between items-center mt-5">
                                   <span class="text-3xl font-bold text-green-600">$<span id="modalPrice">0</span></span>
                              </div>
                       </div>


                    <div class="modal-action">
                       <form method="dialog">
                       <!-- if there is a button in form, it will close the modal -->
                            <button class="btn">Close</button>
                        </form>
                    </div>
              </div>
         </dialog>
    </section>

   <!-- javascript file -->
   <script src="script.js"></script>
</body>
</html>
